name: Install OCI Workspace

on:
  schedule:
    - cron: '00 21 * * 6'  # At 21:00 on Saturday.

  workflow_dispatch:
    inputs:
      rhel9:
        type: boolean
        description: 'RHEL 9'
        default: true
      centos9s:
        type: boolean
        description: 'CentOS 9S'
        default: true
      centos10:
        type: boolean
        description: 'CentOS 10'
        default: true
      debian12:
        type: boolean
        description: 'Debian 12'
        default: true
      debian13:
        type: boolean
        description: 'Debian 13'
        default: true
      ubuntu2204:
        type: boolean
        description: 'Ubuntu 22.04'
        default: true
      ubuntu2404:
        type: boolean
        description: 'Ubuntu 24.04'
        default: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:

      - name: Set matrix names
        id: set-matrix
        run: |
          matrix=$(echo '{
            "include": [
              {"execute": '${{ github.event.inputs.centos9s || true }}', "name": "CentOS 9S", "os": "base-centos9s", "distr": "onlyoffice"},
              {"execute": '${{ github.event.inputs.rhel9    || true }}', "name": "RHEL 9",    "os": "rhel9",         "distr": "generic"},
              {"execute": '${{ github.event.inputs.centos10 || true }}', "name": "CentOS 10", "os": "base-centos10", "distr": "onlyoffice"},
              {"execute": '${{ github.event.inputs.debian12 || true }}', "name": "Debian 12", "os": "base-debian12", "distr": "onlyoffice"},
              {"execute": '${{ github.event.inputs.debian13 || true }}', "name": "Debian 13", "os": "base-debian13", "distr": "onlyoffice"},
              {"execute": '${{ github.event.inputs.ubuntu2204 || true }}', "name": "Ubuntu 22.04", "os": "base-ubuntu2204", "distr": "onlyoffice"},
              {"execute": '${{ github.event.inputs.ubuntu2404 || true }}', "name": "Ubuntu 24.04", "os": "base-ubuntu2404", "distr": "onlyoffice"}
            ]
          }' | jq -c '{include: [.include[] | select(.execute == true)]}')
          echo "matrix=${matrix}" >> $GITHUB_OUTPUT

  vagrant-up:
    name: "Install (${{ matrix.name}})"
    runs-on: ubuntu-22.04
    needs: prepare
    defaults:
      run:
        working-directory: tests/vagrant
    strategy:
      fail-fast: false
      matrix: ${{fromJSON(needs.prepare.outputs.matrix)}}

    steps:
      - name: Free Disk Space
        working-directory: ${{ github.workspace }}
        run: |
          sudo docker image prune --all --force
          sudo rm -rf /usr/local/lib/android || true

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Get update and install vagrant
        working-directory: ${{ github.workspace }}
        run: |
          set -eux
          sudo wget -O- https://apt.releases.hashicorp.com/gpg | sudo gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
          sudo echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com $(grep -oP '(?<=UBUNTU_CODENAME=).*' /etc/os-release || lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/hashicorp.list
          sudo apt update -y
          sudo apt-get install -y vagrant
          # Temporary install VBox 7.1.12 via curl (.deb) to avoid SSH/NAT issues in 7.1.14
          VBOX_DEB=$(curl -fsSL https://download.virtualbox.org/virtualbox/7.1.12/MD5SUMS | grep -oE 'virtualbox-7\.1_7\.1\.12-[0-9]+~Ubuntu~jammy_amd64\.deb' | head -n1)
          [ -n "$VBOX_DEB" ] || { echo "ERROR: could not detect VBox .deb filename"; exit 1; }
          curl -fsSL "https://download.virtualbox.org/virtualbox/7.1.12/${VBOX_DEB}" -o /tmp/vbox.deb
          sudo apt-get install -y /tmp/vbox.deb

      - name: Install
        timeout-minutes: 90
        env:
          DISTR: ${{ matrix.distr }}
          RAM: '8192'
          CPU: '3'
          OS: ${{ matrix.os }}
        run: |
          set -eux
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            export DOWNLOAD_SCRIPT='-ds true'
            export TEST_CASE='--production-install'
            export ARGUMENTS="-arg '--skiphardwarecheck true --makeswap false'"
          else
            export DOWNLOAD_SCRIPT='-ds false'
            export TEST_REPO='-tr true'
            export ARGUMENTS="-arg '--skiphardwarecheck true --makeswap false --localscripts true'"
          fi
          vagrant up

      - name: Health check
        run: |
          if vagrant status | grep -q "running"; then
            vagrant ssh -c "sudo bash /home/vagrant/tests/vagrant/post-install.sh healthcheck" || true
          else
            echo "VM is not running, skipping health check"
          fi

      - name: Collect logs
        if: always()
        run: |
          if vagrant status | grep -q "running"; then
            vagrant ssh -c "sudo bash /home/vagrant/tests/vagrant/post-install.sh logs" || true
          else
            echo "VM is not running, skipping log collection"
          fi

      - name: Cleanup
        if: always()
        run: |
          vagrant destroy --force || true
          vagrant global-status --prune || true
